<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Platform · SKC</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232d5e45'/><text y='.9em' font-size='60' x='50%' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>HR</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0e0c;
  --ink2: #4a4843;
  --ink3: #8c8a85;
  --paper: #faf8f4;
  --card: #ffffff;
  --line: #e8e4dc;
  --line2: #f0ece4;
  --sage: #2d5e45;
  --sage-mid: #3d7a5c;
  --sage-light: #eaf4ee;
  --sage-xlight: #f3faf6;
  --amber: #92500a;
  --amber-light: #fef3e2;
  --red: #a82c2c;
  --red-light: #fdeaea;
  --blue: #1d4e8f;
  --blue-light: #eaf0fb;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Sarabun', sans-serif;
  --r: 12px;
  --r-lg: 18px;
  --shadow: 0 1px 4px rgba(15,14,12,0.06), 0 4px 16px rgba(15,14,12,0.04);
  --shadow-lg: 0 4px 12px rgba(15,14,12,0.08), 0 12px 40px rgba(15,14,12,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ===================== AUTH ===================== */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--paper);
  background-image: radial-gradient(circle at 20% 50%, rgba(45,94,69,0.04) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(29,78,143,0.03) 0%, transparent 40%);
}
.auth-wrap {
  width: 440px;
  max-width: 95vw;
}
.auth-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 40px;
}
.auth-brand-dot {
  width: 32px; height: 32px;
  background: var(--sage);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  letter-spacing: -0.5px;
}
.auth-brand-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.02em;
}
.auth-brand-ver {
  font-size: 11px;
  color: var(--ink3);
  font-family: var(--mono);
}
.auth-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 40px;
  box-shadow: var(--shadow-lg);
}
.auth-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
.auth-sub { color: var(--ink2); font-size: 14px; margin-bottom: 32px; }

.input-group { margin-bottom: 20px; }
.input-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.input-field {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid var(--line);
  border-radius: var(--r);
  background: var(--card);
  font-size: 15px;
  font-family: var(--sans);
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input-field:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(45,94,69,0.1);
}
.btn-login {
  width: 100%;
  padding: 14px;
  background: var(--sage);
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-size: 15px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.btn-login:hover { background: #234d38; }
.btn-login:active { transform: scale(0.99); }
.auth-err {
  background: var(--red-light);
  border: 1px solid #e8aaaa;
  color: var(--red);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-top: 14px;
  display: none;
  align-items: center;
  gap: 8px;
}
.auth-err.show { display: flex; }
.auth-hint {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  font-size: 12px;
  color: var(--ink3);
  line-height: 2;
}
.auth-hint code {
  background: var(--line2);
  padding: 1px 7px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink2);
}

/* ===================== APP SHELL ===================== */
#app { display: none; }
.topbar {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  padding: 0 32px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.tb-brand {
  display: flex;
  align-items: center;
  gap: 9px;
}
.tb-dot {
  width: 26px; height: 26px;
  background: var(--sage);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 11px; font-weight: 500;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
}
.tb-name { font-size: 14px; font-weight: 600; }
.tb-right { display: flex; align-items: center; gap: 10px; }
.role-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px 4px 8px;
  border-radius: 20px;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.02em;
}
.role-chip-dot { width: 6px; height: 6px; border-radius: 50%; }
.chip-hr    { background: #ede9f8; color: #4a3a7a; }
.chip-hr    .role-chip-dot { background: #7c5cbf; }
.chip-mgr   { background: var(--sage-light); color: var(--sage); }
.chip-mgr   .role-chip-dot { background: var(--sage); }
.chip-mtor  { background: var(--amber-light); color: var(--amber); }
.chip-mtor  .role-chip-dot { background: var(--amber); }
.tb-user { font-size: 13px; color: var(--ink2); }
.tb-logout {
  padding: 6px 12px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: transparent;
  color: var(--ink3);
  font-size: 13px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.15s;
}
.tb-logout:hover { border-color: var(--ink3); color: var(--ink); }

.main { max-width: 1000px; margin: 0 auto; padding: 36px 28px; }

/* ===================== PAGE HEADER ===================== */
.page-hero { margin-bottom: 32px; }
.page-hero h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.4px;
  margin-bottom: 4px;
}
.page-hero p { color: var(--ink2); font-size: 14px; }

/* ===================== STAT CARDS ===================== */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
.stat {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.stat::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--r) var(--r) 0 0;
}
.stat-default::before { background: var(--line); }
.stat-red::before    { background: var(--red); }
.stat-amber::before  { background: #e8920a; }
.stat-sage::before   { background: var(--sage); }
.stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 8px;
}
.stat-val {
  font-size: 28px;
  font-weight: 700;
  font-family: var(--mono);
  letter-spacing: -1px;
}
.stat-red .stat-val    { color: var(--red); }
.stat-amber .stat-val  { color: var(--amber); }
.stat-sage .stat-val   { color: var(--sage); }

/* ===================== TABS ===================== */
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 24px;
  background: var(--line2);
  padding: 4px;
  border-radius: 10px;
  width: fit-content;
}
.tab {
  padding: 8px 22px;
  border-radius: 7px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--ink2);
  font-family: var(--sans);
  transition: all 0.15s;
}
.tab.on {
  background: var(--card);
  color: var(--ink);
  box-shadow: 0 1px 4px rgba(15,14,12,0.1);
}

/* ===================== SECTION DIVIDER ===================== */
.sdiv {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px 0 16px;
}
.sdiv-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  white-space: nowrap;
}
.sdiv-line { flex: 1; height: 1px; background: var(--line); }
.sdiv-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

/* ===================== PROBATION CARD ===================== */
.pcard {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 22px 24px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s;
}
.pcard:hover { box-shadow: 0 2px 8px rgba(15,14,12,0.08), 0 8px 24px rgba(15,14,12,0.06); }
.pcard.done {
  opacity: 0.65;
  border-style: dashed;
  box-shadow: none;
}
.pc-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 12px;
}
.pc-name {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.2px;
}
.pc-name .nick {
  font-size: 13px;
  font-weight: 400;
  color: var(--ink2);
  margin-left: 4px;
}
.pc-meta { font-size: 13px; color: var(--ink2); margin-top: 2px; }
.pc-id { font-family: var(--mono); font-size: 11px; color: var(--ink3); margin-top: 3px; }
.pc-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* status badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  white-space: nowrap;
}
.badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.b-red    { background: var(--red-light);   color: var(--red);   }
.b-red::before    { background: var(--red);   }
.b-amber  { background: var(--amber-light); color: var(--amber); }
.b-amber::before  { background: var(--amber); }
.b-sage   { background: var(--sage-light);  color: var(--sage);  }
.b-sage::before   { background: var(--sage);  }
.b-gray   { background: var(--line2);       color: var(--ink3);  }
.b-gray::before   { background: var(--ink3);  }
.b-blue   { background: var(--blue-light);  color: var(--blue);  }
.b-blue::before   { background: var(--blue);  }

/* date boxes */
.pc-dates {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.datebox {
  background: var(--line2);
  border-radius: 10px;
  padding: 12px 14px;
}
.datebox-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}
.datebox-val {
  font-size: 14px;
  font-weight: 600;
  font-family: var(--mono);
  line-height: 1.3;
}
.dv-red   { color: var(--red); }
.dv-amber { color: var(--amber); }
.dv-muted { color: var(--ink3); }

/* progress bar */
.pbar-wrap {
  height: 6px;
  background: var(--line2);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}
.pbar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.pf-sage  { background: linear-gradient(90deg, var(--sage-mid), var(--sage)); }
.pf-amber { background: linear-gradient(90deg, #e8920a, #bf6d06); }
.pf-red   { background: linear-gradient(90deg, #c94040, var(--red)); }
.pf-gray  { background: var(--line); }
.pbar-lbl { font-size: 11px; color: var(--ink3); }

/* mentor section inside card */
.mentor-section {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}
.mentor-assigned {
  display: flex;
  align-items: center;
  gap: 12px;
}
.mentor-ava {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--sage-light);
  color: var(--sage);
  font-weight: 700;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: 2px solid var(--sage-light);
}
.mentor-info { flex: 1; min-width: 0; }
.mentor-nm { font-size: 14px; font-weight: 600; }
.mentor-dp { font-size: 12px; color: var(--ink2); }
.mentor-bgt {
  text-align: right;
  flex-shrink: 0;
}
.bgt-num {
  font-size: 15px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--sage);
}
.bgt-lbl { font-size: 11px; color: var(--ink3); }

/* no mentor CTA */
.no-mentor {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.no-mentor-text {
  font-size: 13px;
  color: var(--ink3);
}

/* ===================== BUTTONS ===================== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  white-space: nowrap;
  text-decoration: none;
}
.btn:active { transform: scale(0.98); }
.btn-sage { background: var(--sage); color: #fff; }
.btn-sage:hover { background: #234d38; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--line);
  color: var(--ink2);
}
.btn-outline:hover { border-color: var(--ink3); color: var(--ink); background: var(--line2); }
.btn-ghost {
  background: transparent;
  border: none;
  color: var(--ink3);
  padding: 6px 10px;
}
.btn-ghost:hover { color: var(--ink); background: var(--line2); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-assign {
  background: var(--sage-xlight);
  border: 1.5px solid rgba(45,94,69,0.2);
  color: var(--sage);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: 9px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 7px;
}
.btn-assign:hover {
  background: var(--sage-light);
  border-color: rgba(45,94,69,0.35);
}
.btn-assign:active { transform: scale(0.98); }
.btn-email {
  background: var(--blue-light);
  border: 1.5px solid rgba(29,78,143,0.2);
  color: var(--blue);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
}
.btn-email:hover { background: #d8e6f8; }

/* ===================== CARD generic ===================== */
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 20px 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-0 { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow); }

/* ===================== TABLE ===================== */
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  background: var(--line2);
}
td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--line2);
  font-size: 14px;
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.1s; }
tbody tr:hover td { background: var(--line2); }

/* ===================== BUDGET BAR ===================== */
.bbar-wrap { height: 7px; background: var(--line2); border-radius: 4px; overflow: hidden; }
.bbar-fill { height: 100%; border-radius: 4px; }

/* ===================== SECTION HEADER ===================== */
.shdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.shdr h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }

/* ===================== MENTOR PICKER MODAL ===================== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,14,12,0.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 300;
  padding: 20px;
}
.modal-overlay.open { display: flex; animation: fadein 0.2s; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--card);
  border-radius: 20px;
  padding: 32px;
  width: 580px;
  max-width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(15,14,12,0.2), 0 2px 8px rgba(15,14,12,0.1);
  animation: slideup 0.25s cubic-bezier(0.34,1.4,0.64,1);
}
.modal-wide { width: 680px; }
@keyframes slideup { from { transform: translateY(24px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
.modal-sub { font-size: 13px; color: var(--ink2); margin-bottom: 24px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; border-top: 1px solid var(--line); padding-top: 20px; }

/* mentor picker cards */
.picker-section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.picker-section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.picker-section-label:first-child { margin-top: 0; }

.mentor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.mcard {
  border: 2px solid var(--line);
  border-radius: 14px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.18s;
  background: var(--card);
  position: relative;
  overflow: hidden;
}
.mcard:hover {
  border-color: rgba(45,94,69,0.4);
  box-shadow: 0 2px 8px rgba(45,94,69,0.1);
}
.mcard.picked {
  border-color: var(--sage);
  background: var(--sage-xlight);
  box-shadow: 0 0 0 3px rgba(45,94,69,0.12);
}
.mcard-check {
  position: absolute;
  top: 12px; right: 12px;
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--line);
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-size: 11px;
}
.mcard.picked .mcard-check {
  background: var(--sage);
  border-color: var(--sage);
  color: #fff;
}
.mcard-ava {
  width: 40px; height: 40px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}
.mcard.same-dept .mcard-ava { background: var(--sage-light); color: var(--sage); }
.mcard:not(.same-dept) .mcard-ava { background: var(--line2); color: var(--ink2); }
.mcard-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.mcard-dept { font-size: 12px; color: var(--ink2); margin-bottom: 8px; }
.mcard-stats { display: flex; gap: 8px; flex-wrap: wrap; }
.mcard-stat {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 600;

<script>
// ============================================================
// HR Platform v4 — Google Sheet Edition
// ============================================================

// ▼▼▼ ใส่ URL ของ Apps Script Web App ที่ deploy แล้วตรงนี้ ▼▼▼
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzTAmQXur041ivSP8sxyOy9YFnVGyo7quoAVRcd76pq0UEeDYoL2Y1nkBF__fZQbjf/exec';
// ▲▲▲ ตัวอย่าง: 'https://script.google.com/macros/s/AKfy.../exec' ▲▲▲

// ============================================================
// STATE
// ============================================================
let role = null, user = null, assignEmpId = null, pickedMentorId = null;
let EMP_DATA = [], MGR_DATA = [], MENTOR_DATA = [], SUPV_DATA = [], PAIRS = [], HR_PWD = '';
let PROB_D = 119, BUDGET = 3000, PAY_D = 28, NOTICE = 30;
let HR_EMAIL = '';
const HR_NOTIFIED = new Set(); // เก็บ emp.id ที่ HR mark รับทราบแล้ว (session only)
const NOTIF_READ   = new Set(); // notification ที่อ่านแล้ว

// ============================================================
// BOOTSTRAP — fetch data then render auth
// ============================================================
async function bootstrap() {
  const isConfigured = APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE';

  if (!isConfigured) {
    showLoadError(
      'ยังไม่ได้ตั้งค่า Apps Script URL',
      `เปิดไฟล์ <code>hr-platform.html</code> แล้วแก้บรรทัด<br>
       <code>APPS_SCRIPT_URL</code> ในไฟล์ HTML<br>
       ให้เป็น URL จริงของ Apps Script Web App ที่ deploy แล้ว`
    );
    return;
  }

  try {
    setLoadTxt('กำลังเชื่อมต่อ Google Sheet...');
    const res = await fetch(APPS_SCRIPT_URL + '?action=all');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'load failed');

    // Populate globals — ตรง field name กับ Apps Script doGet response
    EMP_DATA    = data.employees;   // Mentee sheet → employees
    MGR_DATA    = data.managers;
    SUPV_DATA   = data.supervisors || [];  // Supervisor sheet (หัวหน้าโดยตรง)
    MENTOR_DATA = data.mentors;
    PAIRS       = data.pairs;
    HR_PWD      = String(data.config.HR_PASSWORD || '').trim();
    HR_EMAIL     = String(data.config.HR_EMAIL || '').trim();
    // pairs มี assignedAt แล้วจาก Apps Script ใหม่
    PROB_D      = data.config.PROB_DAYS;
    BUDGET      = data.config.BUDGET;
    PAY_D       = data.config.PAYROLL_DAY;
    NOTICE      = data.config.NOTICE_DAYS;

    // Mark probation status on employees
    EMP_DATA.forEach(e => { e.isProb = !calcProb(e.startDate).done; });

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display   = 'flex';

  } catch (err) {
    showLoadError(
      'โหลดข้อมูลไม่สำเร็จ',
      `ข้อผิดพลาด: <code>${err.message}</code><br><br>
       กรุณาตรวจสอบ:<br>
       1. URL ของ Apps Script ถูกต้อง<br>
       2. Deploy เป็น Web app → Who has access: <strong>Anyone</strong><br>
       3. Google Sheet มี sheet ชื่อ Mentee / Mentor / Manager / HR_Config / Budget_Record`
    );
  }
}

function setLoadTxt(msg) {
  const el = document.getElementById('load-txt');
  if (el) el.textContent = msg;
}

function showLoadError(title, body) {
  const el = document.getElementById('loading-screen');
  el.innerHTML = `<div class="load-err"><h3>⚠ ${title}</h3><p>${body}</p></div>`;
}

// ── API helpers ───────────────────────────────────────────
async function apiPost(body) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(body),
  });
  return res.json();
}

// ============================================================
// DATE UTILS
// ============================================================
const parseD = s => new Date(s + 'T00:00:00');
const fmtD   = d => d.toLocaleDateString('th-TH', {day:'numeric',month:'short',year:'numeric'});
const addD   = (d,n) => { let r=new Date(d); r.setDate(r.getDate()+n); return r; };
const todayD = () => new Date(new Date().toDateString());

function payDeadline(yr, mo) {
  let d = new Date(yr, mo - 1, PAY_D);
  while (d.getDay() === 6 || d.getDay() === 0) d.setDate(d.getDate() - 1);
  return d;
}

function calcProb(startStr) {
  const start = parseD(startStr);
  const endP  = addD(start, PROB_D - 1);
  const t     = todayD();
  const dLeft = Math.ceil((endP - t) / 86400000);
  const done  = dLeft < 0;
  const pct   = Math.max(0, Math.min(100, Math.round(((PROB_D - Math.max(0,dLeft)) / PROB_D) * 100)));
  const lNotice = addD(endP, -NOTICE);
  const pay   = payDeadline(endP.getFullYear(), endP.getMonth() + 1);
  const dl    = pay < lNotice ? pay : lNotice;
  const dDL   = Math.ceil((dl - t) / 86400000);
  return { start, endP, dl, dLeft, dDL, pct, done };
}

function statusOf(dDL, done, hrAck) {
  if (done)    return {lbl:'ผ่านทดลองงานแล้ว',        cls:'b-gray',  bar:'pf-gray',  pulse:false};
  if (dDL < 0 && hrAck) return {lbl:'HR รับทราบแล้ว ✓',        cls:'b-sage',  bar:'pf-sage',  pulse:false};
  if (dDL < 0) return {lbl:'เกินกำหนดแจ้ง HR แล้ว!', cls:'b-red',   bar:'pf-red',   pulse:true};
  if (dDL<=7)  return {lbl:`ด่วน! แจ้งใน ${dDL} วัน`,cls:'b-red',   bar:'pf-red',   pulse:true};
  if (dDL<=21) return {lbl:`แจ้งภายใน ${dDL} วัน`,   cls:'b-amber', bar:'pf-amber', pulse:false};
  return         {lbl:`เหลือ ${dDL} วัน`,             cls:'b-sage',  bar:'pf-sage',  pulse:false};
}

// ============================================================
// AUTH
// ============================================================
function doLogin() {
  const v   = document.getElementById('login-input').value.trim();
  const err = document.getElementById('login-err');
  err.classList.remove('show');
  if (!v) return;

  // HR
  if (HR_PWD && v === HR_PWD) {
    role = 'hr'; user = {id:'HR', name:'HR Admin', nick:'HR'}; return go();
  }
  // Manager (หัวหน้าระดับส่วน — เลือกพี่เลี้ยง)
  const mgr = MGR_DATA.find(m => String(m.id) === String(v));
  if (mgr) { role = 'manager'; user = mgr; return go(); }
  // Supervisor (หัวหน้าโดยตรง — ดู countdown น้องตัวเอง)
  const supv = SUPV_DATA.find(s => String(s.id) === String(v));
  if (supv) { role = 'supervisor'; user = supv; return go(); }
  // Mentor
  const mtor = MENTOR_DATA.find(m => String(m.id) === String(v));
  if (mtor) { role = 'mentor'; user = mtor; return go(); }

  err.classList.add('show');
}

function go() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display         = 'block';
  document.getElementById('login-input').value         = '';

  const chip = document.getElementById('role-chip');
  const lbl  = document.getElementById('role-label');
  const ul   = document.getElementById('user-label');

  if (role === 'hr') {
    chip.className = 'role-chip chip-hr'; lbl.textContent = 'HR'; ul.textContent = 'HR Admin';
  } else if (role === 'manager') {
    chip.className = 'role-chip chip-mgr'; lbl.textContent = 'Manager (เลือกพี่เลี้ยง)';
    ul.textContent = user.name;
  } else if (role === 'supervisor') {
    chip.className = 'role-chip chip-mgr'; lbl.textContent = 'Supervisor (หัวหน้าโดยตรง)';
    ul.textContent = user.name;
  } else {
    chip.className = 'role-chip chip-mtor'; lbl.textContent = 'Mentor';
    ul.textContent = user.name;
  }

  ['hr','manager','supervisor','mentor'].forEach(r => {
    const el = document.getElementById('view-'+r);
    if (el) el.classList.add('hidden');
  });
  document.getElementById('view-' + role).classList.remove('hidden');

  if      (role === 'hr')         { renderHR(); renderNotif(); }
  else if (role === 'manager')    renderMgr();
  else if (role === 'supervisor') renderSupervisor();
  else                            renderMentor();
}

function logout() {
  role = null; user = null;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display         = 'none';
}

// ============================================================
// MODAL HELPERS
// ============================================================
const openM  = id => document.getElementById(id).classList.add('open');
const closeM = id => document.getElementById(id).classList.remove('open');
document.querySelectorAll('.modal-overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); }));

function sdiv(label, count, cls) {
  return `<div class="sdiv">
    <span class="sdiv-label">${label}</span>
    <span class="sdiv-pill badge ${cls}">${count} คน</span>

  </div>`;

// ============================================================
// PROBATION CARD
// ============================================================
function deptColor(dept) {
  const d = (dept || '').toLowerCase();
  if (d.includes('hr') || d.includes('human')) return '#2d5e45';
  if (d.includes('digital') || d.includes('it') || d.includes('tech')) return '#1d4e8f';
  if (d.includes('finance') || d.includes('planning') || d.includes('account')) return '#92500a';
  if (d.includes('sustain') || d.includes('kubota solution')) return '#2e7d32';
  if (d.includes('marketing') || d.includes('strategy')) return '#7b1fa2';
  if (d.includes('service') || d.includes('after')) return '#c62828';
  if (d.includes('parts') || d.includes('อะไหล่')) return '#e65100';
  if (d.includes('quality') || d.includes('qc') || d.includes('ตรวจสอบ')) return '#00695c';
  if (d.includes('distribution') || d.includes('network')) return '#1565c0';
  if (d.includes('manufacture') || d.includes('production') || d.includes('วิศวกรรมการผลิต')) return '#4e342e';
  if (d.includes('safety') || d.includes('environment') || d.includes('ความปลอดภัย')) return '#558b2f';
  if (d.includes('corporate') || d.includes('strategy')) return '#4527a0';
  const palette = ['#2d5e45','#1d4e8f','#92500a','#7b1fa2','#c62828','#00695c','#e65100','#1565c0'];
  let hash = 0;
  for (let i = 0; i < (dept||'').length; i++) hash = (hash * 31 + (dept||'').charCodeAt(i)) & 0xffffffff;
  return palette[Math.abs(hash) % palette.length];
}

function probCard(emp, viewRole) {
  const {start,endP,dl,dLeft,dDL,pct,done} = calcProb(emp.startDate);
  const st     = statusOf(dDL, done, emp.hrAcknowledged);
  // รวม budget ที่ใช้ไปทุก pair ของน้องคนนี้
  const allPairs      = PAIRS.filter(p => p.eeId === emp.id);
  const pair          = allPairs[allPairs.length - 1]; // pair ล่าสุด = พี่เลี้ยงคนปัจจุบัน
  const mentor        = pair ? MENTOR_DATA.find(m => m.id === pair.mId) : null;
  const totalUsed     = allPairs.reduce((s,p) => s+p.used, 0);
  const bLeft         = BUDGET - totalUsed; // budget รวมทั้ง 3,000 ลบด้วยยอดสะสม
  const wasChanged    = pair?.changedAt != null; // เคยเปลี่ยนพี่เลี้ยงมาก่อน

  const dlClass    = done ? 'dv-muted' : dDL <= 7 ? 'dv-red' : dDL <= 21 ? 'dv-amber' : '';
  const dateBoxes  = `
    <div class="pc-dates">
      <div class="datebox"><div class="datebox-label">วันเริ่มงาน</div><div class="datebox-val">${fmtD(start)}</div></div>
      <div class="datebox"><div class="datebox-label">ครบ ${PROB_D} วัน</div><div class="datebox-val ${done?'dv-muted':''}">${fmtD(endP)}</div></div>
      <div class="datebox" style="${!done&&dDL<=7?'background:var(--red-light);border:1px solid rgba(168,44,44,0.2)':''}">
        <div class="datebox-label">แจ้ง HR ภายใน</div>
        <div class="datebox-val ${dlClass}">${done?'—':fmtD(dl)}</div>
      </div>
    </div>`;

  const reminderSection = (!done && (viewRole === 'manager' || viewRole === 'supervisor')) ? `
    <div style="margin-top:14px;padding:12px 16px;background:${dDL<=7?'var(--red-light)':dDL<=21?'var(--amber-light)':'var(--line2)'};border-radius:10px;border-left:3px solid ${dDL<=7?'var(--red)':dDL<=21?'var(--amber)':'#ccc'}">
      <div style="font-size:11px;font-weight:700;color:${dDL<=7?'var(--red)':dDL<=21?'var(--amber)':'var(--ink3)'};text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px">
        ${dDL<0?'⚠ เกินกำหนดแจ้ง HR แล้ว':dDL<=7?'⚠ ต้องแจ้ง HR ด่วน':'📋 Reminder'}
      </div>
      <div style="font-size:13px;color:var(--ink2)">
        ${dDL < 0
          ? `ควรแจ้ง HR ก่อนวันที่ <strong>${fmtD(dl)}</strong> แต่เกินมาแล้ว ${Math.abs(dDL)} วัน`
          : `ต้องแจ้งผล probation ของ <strong>${emp.nick}</strong> ให้ HR ทราบภายในวันที่ <strong style="color:${dDL<=7?'var(--red)':dDL<=21?'var(--amber)':'var(--ink)'}">${fmtD(dl)}</strong> (อีก ${dDL} วัน)`
        }
      </div>
    </div>` : (!done && viewRole === 'hr') ? `
    <div style="margin-top:14px;padding:10px 14px;background:var(--line2);border-radius:8px;font-size:12px;color:var(--ink3)">
      ต้องแจ้ง HR ภายใน <strong style="color:var(--ink2)">${fmtD(dl)}</strong>${dDL > 0 ? ` (อีก ${dDL} วัน)` : ` (เกินมา ${Math.abs(dDL)} วัน)`}
    </div>` : '';

  const mentorSection = mentor ? `
    <div class="mentor-section">
      <div class="mentor-assigned">
        <div class="mentor-ava" style="background:${deptColor(mentor.dept)};border:2px solid rgba(255,255,255,0.8)"></div>
        <div class="mentor-info">
          <div class="mentor-nm">${mentor.name} <span style="font-weight:400;color:var(--ink3);font-size:12px">(${mentor.nick})</span></div>
          <div class="mentor-dp">พี่เลี้ยง · ${mentor.dept} · ${mentor.section}</div>
        </div>
        <div class="mentor-bgt">
          <div class="bgt-num" style="color:${bLeft<500?'var(--red)':bLeft<1500?'var(--amber)':'var(--sage)'}">฿${Math.max(0,bLeft).toLocaleString()}</div>
          <div class="bgt-lbl">budget คงเหลือ (รวม ฿${totalUsed.toLocaleString()} ที่ใช้ไป)</div>
        </div>
        ${(viewRole === 'manager' && !done) ? `<button class="btn btn-outline btn-sm" onclick="openAssign('${emp.id}')">เปลี่ยน</button>` : ''}
      </div>
      ${wasChanged ? `
        <div style="margin-top:10px;padding:10px 14px;background:var(--amber-light);border-radius:8px;border-left:3px solid var(--amber);font-size:12px;color:var(--amber)">
          <strong>⚠ มีการเปลี่ยนพี่เลี้ยง</strong> — กรุณาแจ้ง HR ด้วยนะคะ · Budget นับสะสมต่อเนื่อง (฿${totalUsed.toLocaleString()} / ฿${BUDGET.toLocaleString()})
        </div>` : ''}
    </div>`
  : (viewRole === 'manager' && !done) ? `
    <div class="mentor-section">
      <div class="no-mentor">
        <div>
          <div class="no-mentor-text">ยังไม่มีพี่เลี้ยง</div>
          <div style="font-size:12px;color:var(--ink3);margin-top:2px">กดปุ่มด้านขวาเพื่อเลือกพี่เลี้ยงให้น้อง</div>
        </div>
        <button class="btn-assign" onclick="openAssign('${emp.id}')">
          <span style="font-size:16px">＋</span> เลือกพี่เลี้ยง
        </button>
      </div>
    </div>`
  : `<div class="mentor-section" style="color:var(--ink3);font-size:13px">${done?'—':'ยังไม่มีพี่เลี้ยง'}</div>`;

  const notified = HR_NOTIFIED.has(emp.id) || emp.hrAcknowledged;
  const emailBtn = viewRole === 'hr' && !done ? (
    notified
      ? '<span class="badge b-sage" style="font-size:12px">✓ รับทราบแล้ว</span>'
      : `<button class="btn-email" onclick="markHRNotified('${emp.id}')">✓ รับทราบ</button>
         <button class="btn-email" style="background:var(--blue-light);color:var(--blue);margin-left:4px" onclick="remindOne('${emp.id}')">📧 เตือน</button>`
  ) : '';

  return `
  <div class="pcard ${done ? 'done' : ''}">
    <div class="pc-top">
      <div>
        <div class="pc-name">${emp.name}<span class="nick">(${emp.nick})</span></div>
        <div class="pc-meta">${emp.dept} · ${emp.section} · ${emp.unit}</div>
        <div class="pc-meta" style="font-size:12px;color:var(--ink3);margin-top:1px">${emp.pos}</div>
        <div class="pc-id">${emp.id}</div>
      </div>
      <div class="pc-actions">
        ${emailBtn}
        <span class="badge ${st.cls} ${st.pulse?'urgent-pulse':''}">${st.lbl}</span>
      </div>
    </div>
    ${dateBoxes}
    <div class="pbar-wrap">
      <div class="pbar-fill ${st.bar}" style="width:${pct}%"></div>
    </div>
    <div class="pbar-lbl">
      ${done ? `ผ่านทดลองงานแล้ว · ครบ ${PROB_D} วัน`
             : `ผ่านมา ${pct}% ·${dLeft>0?' เหลืออีก '+dLeft+' วัน':' ครบแล้ว'}`}
    </div>
    ${reminderSection}
    ${mentorSection}
  </div>`;
}

// ============================================================
// HR VIEW
// ============================================================
function renderHR() {
  document.getElementById('view-hr').innerHTML = `
    <div class="page-hero">
      <h1>HR Dashboard</h1>
      <p>ภาพรวมพนักงานทดลองงาน · จัดการ Mentor-Mentee · ติดตาม Budget</p>
    </div>
    <div class="tabs" id="hr-tabs">
      <button class="tab on" onclick="hrTab('prob',this)">Probation</button>
      <button class="tab" onclick="hrTab('mentors',this)">พี่เลี้ยง</button>
      <button class="tab" onclick="hrTab('budget',this)">Budget</button>
      <button class="tab" onclick="hrTab('all',this)">พนักงานทั้งหมด</button>
    </div>
    <div id="t-prob"></div>
    <div id="t-mentors" class="hidden"></div>
    <div id="t-budget"  class="hidden"></div>
    <div id="t-all"     class="hidden"></div>
  `;
  renderProb();
}

function hrTab(tab, el) {
  ['prob','mentors','budget','all'].forEach(t => document.getElementById('t-'+t).classList.add('hidden'));
  document.getElementById('t-'+tab).classList.remove('hidden');
  document.querySelectorAll('#hr-tabs .tab').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  if (tab === 'prob')    renderProb();
  if (tab === 'mentors') renderMentorTab();
  if (tab === 'budget')  renderBgtTab();
  if (tab === 'all')     renderAllTab();
}

function renderProb() {
  const act  = EMP_DATA.filter(e => !calcProb(e.startDate).done);
  const done = EMP_DATA.filter(e =>  calcProb(e.startDate).done);
  let urg = 0, w = 0;
  act.forEach(e => { const {dDL} = calcProb(e.startDate); if (dDL<=7) urg++; else if (dDL<=21) w++; });

  let html = `
  <div class="stats">
    <div class="stat stat-default"><div class="stat-label">ทดลองงานอยู่</div><div class="stat-val">${act.length}</div></div>
    <div class="stat ${urg>0?'stat-red':'stat-default'}"><div class="stat-label">ด่วน (≤7 วัน)</div><div class="stat-val">${urg}</div></div>
    <div class="stat ${w>0?'stat-amber':'stat-default'}"><div class="stat-label">ใกล้กำหนด (≤21)</div><div class="stat-val">${w}</div></div>
    <div class="stat stat-default"><div class="stat-label">ครบแล้ว</div><div class="stat-val">${done.length}</div></div>
  </div>`;

  html += sdiv('กำลังทดลองงาน', act.length, 'b-amber');
  html += act.length ? act.map(e => probCard(e,'hr')).join('')
    : `<div style="font-size:13px;color:var(--ink3);padding:10px 0">ไม่มีในขณะนี้</div>`;
  if (done.length) {
    html += sdiv('ครบทดลองงานแล้ว (ดูย้อนหลัง)', done.length, 'b-gray');
    html += done.map(e => probCard(e,'hr')).join('');
  }
  document.getElementById('t-prob').innerHTML = html;
}

function renderMentorTab() {
  const rows = MENTOR_DATA.map(m => {
    const allP = PAIRS.filter(p => p.mId === m.id);
    const actP = allP.filter(p => !calcProb(EMP_DATA.find(e => e.id === p.eeId)?.startDate || '2000-01-01').done);
    return {...m, total: allP.length, activeCnt: actP.length};
  }).sort((a,b) => b.total - a.total);

  document.getElementById('t-mentors').innerHTML = `
    <div class="shdr"><h2>พี่เลี้ยงทั้งหมด</h2></div>
    <div class="card-0">
      <table>
        <thead><tr>
          <th>ชื่อพี่เลี้ยง</th><th>ฝ่าย · ส่วน · หน่วยงาน</th>
          <th>น้องทั้งหมด ↓</th><th>กำลังดูแลอยู่</th><th>สถานะ</th>
        </tr></thead>
        <tbody>${rows.map(m => `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:34px;height:34px;border-radius:50%;background:${deptColor(m.dept)};flex-shrink:0"></div>
                <div>
                  <div style="font-weight:600;font-size:14px">${m.name}</div>
                  <div style="font-size:12px;color:var(--ink3)">${m.nick} · ${m.id}</div>
                </div>
              </div>
            </td>
            <td>
              <div style="font-size:13px;font-weight:600">${m.dept}</div>
              <div style="font-size:12px;color:var(--ink3)">${m.section} · ${m.unit}</div>
            </td>
            <td><span style="font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:-1px">${m.total}</span><span style="font-size:12px;color:var(--ink3)"> คน</span></td>
            <td><span class="badge ${m.activeCnt>0?'b-amber':'b-gray'}">${m.activeCnt} คน</span></td>
            <td>${(() => {
              if (!m.active) return '<span class="badge b-gray">ปิดรับ</span>';
              if (m.activeCnt === 0) return '<span class="badge b-sage">● ว่าง</span>';
              return '<span class="badge b-amber">● ไม่ว่าง</span>';
            })()}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderBgtTab() {
  // เฉพาะคู่ที่ยังใช้งานอยู่ (mentor ปัจจุบันของแต่ละน้อง) และน้องยังทดลองงานอยู่
  const activePairs = PAIRS.filter(p => {
    const emp = EMP_DATA.find(e => e.id === p.eeId);
    if (!emp || emp.mentorId !== p.mId) return false;
    return !calcProb(emp.startDate).done;
  });

  document.getElementById('bgt-pair').innerHTML = activePairs.map(p => {
    const m = MENTOR_DATA.find(x => x.id === p.mId);
    const e = EMP_DATA.find(x => x.id === p.eeId);
    const left = BUDGET - p.used;
    return `<option value="${p.mId}__${p.eeId}">${e?.name||p.eeId} → ${m?.name||p.mId} (คงเหลือ ฿${left.toLocaleString()})</option>`;
  }).join('') || '<option value="">ไม่มีคู่ที่ active</option>';
  document.getElementById('bgt-date').value = new Date().toISOString().split('T')[0];

  document.getElementById('t-budget').innerHTML = `
    <div class="shdr">
      <h2>Budget Mentor-Mentee</h2>
      <button class="btn btn-sage" onclick="openM('m-bgt')">+ บันทึกการเบิก</button>
    </div>
    <div class="card-0">
      <table>
        <thead><tr><th>พี่เลี้ยง</th><th>น้อง</th><th>สถานะคู่</th><th>Budget คงเหลือ</th><th>ใช้ไป</th><th></th></tr></thead>
        <tbody>${[...PAIRS].sort((a,b) => {
          const ea = EMP_DATA.find(x => x.id === a.eeId);
          const eb = EMP_DATA.find(x => x.id === b.eeId);
          const doneA = calcProb(ea?.startDate || '2000-01-01').done;
          const doneB = calcProb(eb?.startDate || '2000-01-01').done;
          if (doneA !== doneB) return doneA ? 1 : -1;
          return 0;
        }).map(p => {
          const m      = MENTOR_DATA.find(x => x.id === p.mId);
          const e      = EMP_DATA.find(x => x.id === p.eeId);
          const left   = BUDGET - p.used;
          const pct    = Math.round((p.used / BUDGET) * 100);
          const isDone = calcProb(e?.startDate || '2000-01-01').done;
          const isActive = e?.mentorId === p.mId;  // คู่ปัจจุบัน
          const col    = !isActive||isDone ? 'var(--ink3)' : pct>80 ? 'var(--red)' : pct>50 ? 'var(--amber)' : 'var(--sage)';
          return `<tr style="${!isActive?'opacity:0.55':''}">
            <td><div style="font-weight:600;font-size:14px">${m?.name||'?'}</div><div style="font-size:12px;color:var(--ink3)">${m?.nick||''}</div></td>
            <td><div style="font-weight:500">${e?.name||'?'}</div></td>
            <td>
              ${isActive && !isDone
                ? '<span class="badge b-sage">คู่ปัจจุบัน</span>'
                : isActive && isDone
                  ? '<span class="badge b-gray">ผ่านแล้ว</span>'
                  : '<span class="badge b-gray" style="font-size:10px">เปลี่ยนพี่เลี้ยงแล้ว</span>'}
            </td>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div class="bbar-wrap" style="flex:1;min-width:90px">
                  <div class="bbar-fill" style="width:${pct}%;background:${col}"></div>
                </div>
                <span style="font-family:var(--mono);font-size:${isActive&&!isDone?14:12}px;font-weight:700;color:${col};min-width:60px;text-align:right;${!isActive||isDone?'text-decoration:line-through':''}">฿${left.toLocaleString()}</span>
              </div>
            </td>
            <td style="font-family:var(--mono);font-size:13px;color:var(--ink2)">฿${p.used.toLocaleString()}</td>
            <td><button class="btn btn-outline btn-sm" onclick="showBgt('${p.mId}','${p.eeId}')">ดูรายละเอียด</button></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderAllTab() {
  const act  = EMP_DATA.filter(e => !calcProb(e.startDate).done);
  const done = EMP_DATA.filter(e =>  calcProb(e.startDate).done);

  function empCards(emps) {
    if (!emps.length) return '';
    return '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:24px">' +
      emps.map(e => {
        const mgr    = MGR_DATA.find(m => m.id === e.mgrId);
        const pair   = PAIRS.find(p => p.eeId === e.id);
        const mentor = pair ? MENTOR_DATA.find(m => m.id === pair.mId) : null;
        const {done: isDone, pct} = calcProb(e.startDate);
        const initial = (e.name || '?').charAt(0);
        const palette = ['#2d5e45','#1d4e8f','#92500a','#6b3fa0','#a82c2c','#0d7a6e'];
        const bg = palette[Number(e.id.slice(-1)) % palette.length];
        return '<div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow)">' +
          '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' +
            '<div style="width:44px;height:44px;border-radius:12px;background:' + bg + ';color:#fff;font-weight:700;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + initial + '</div>' +
            '<div style="min-width:0;flex:1">' +
              '<div style="font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + e.name + '</div>' +
              '<div style="font-size:12px;color:var(--ink3)">' + e.nick + ' · <span style="font-family:var(--mono)">' + e.id + '</span></div>' +
            '</div>' +
            (isDone ? '<span class="badge b-gray" style="font-size:11px;flex-shrink:0">✓ ผ่านแล้ว</span>' : '<span class="badge b-amber" style="font-size:11px;flex-shrink:0">⏳ ทดลองงาน</span>') +
          '</div>' +
          '<div style="font-size:12px;color:var(--ink2);margin-bottom:4px">' +
            '<div style="font-weight:600">' + e.dept + '</div>' +
            '<div style="color:var(--ink3)">' + e.section + (e.unit ? ' · ' + e.unit : '') + '</div>' +
          '</div>' +
          '<div style="font-size:12px;color:var(--ink3);margin-bottom:10px">' + e.pos + '</div>' +
          (!isDone ? '<div style="height:4px;background:var(--line2);border-radius:2px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:' + pct + '%;background:var(--sage);border-radius:2px"></div></div>' : '') +
          '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink3)">' +
            '<span>เริ่มงาน <strong style="color:var(--ink2);font-family:var(--mono)">' + e.startDate + '</strong></span>' +
            (mentor ? '<span style="background:var(--sage-light);color:var(--sage);padding:2px 8px;border-radius:20px;font-weight:600">' + mentor.nick + '</span>' : '<span style="color:var(--ink3)">ยังไม่มีพี่เลี้ยง</span>') +
          '</div>' +
        '</div>';
      }).join('') + '</div>';
  }

  const searchBar = '<div style="margin-bottom:20px"><input id="emp-search" type="text" placeholder="🔍 ค้นหาชื่อ, ชื่อเล่น, รหัส, ฝ่าย..." style="width:100%;padding:12px 16px;border:1.5px solid var(--line);border-radius:12px;font-size:14px;font-family:var(--sans);outline:none;background:var(--card)" oninput="filterEmps()"></div>';

    document.getElementById('t-all').innerHTML =
    '<div class="shdr"><h2>พนักงานทั้งหมดในระบบ</h2></div>' + searchBar +
    '<div id="emp-list">' +
    sdiv('กำลังทดลองงาน', act.length, 'b-amber') + empCards(act) +
    (done.length ? sdiv('ครบทดลองงานแล้ว (ประวัติ)', done.length, 'b-gray') + empCards(done) : '') + '</div>';
}


// ============================================================
// MANAGER VIEW
// ============================================================
function renderMgr() {
  const sec  = user.section;   // ส่วน — ใช้กรองน้อง
  const dept = user.dept;      // ฝ่าย — แสดงใน header
  // น้องใหม่: เห็นเฉพาะ "ส่วน" เดียวกัน
  const act  = EMP_DATA.filter(e => e.section === sec && !calcProb(e.startDate).done);
  const done = EMP_DATA.filter(e => e.section === sec &&  calcProb(e.startDate).done);

  let urg = 0, pending = 0;
  act.forEach(e => { const {dDL} = calcProb(e.startDate); if (dDL<=7) urg++; else if (dDL<=21) pending++; });
  const noMentor = act.filter(e => !PAIRS.find(p => p.eeId === e.id)).length;

  let html = `
    <div class="page-hero">
      <h1>${user.name}</h1>
      <p>ฝ่าย ${dept} · ส่วน ${sec} · น้องใหม่ในส่วนของคุณ</p>
    </div>`;

  if (act.length || done.length) {
    html += `<div class="stats" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat ${urg>0?'stat-red':'stat-default'}"><div class="stat-label">ต้องแจ้ง HR ด่วน</div><div class="stat-val">${urg}</div></div>
      <div class="stat ${pending>0?'stat-amber':'stat-default'}"><div class="stat-label">ใกล้กำหนด (≤ 21 วัน)</div><div class="stat-val">${pending}</div></div>
      <div class="stat ${noMentor>0?'stat-amber':'stat-sage'}"><div class="stat-label">ยังไม่มีพี่เลี้ยง</div><div class="stat-val">${noMentor}</div></div>
    </div>`;
  }

  if (!act.length && !done.length) {
    html += `<div class="empty"><div class="empty-icon">🎉</div><div class="empty-txt">ไม่มีพนักงานทดลองงานในส่วน ${sec}</div></div>`;
  } else {
    html += sdiv('กำลังทดลองงาน', act.length, 'b-amber');
    html += act.length ? act.map(e => probCard(e,'manager')).join('')
      : `<div style="font-size:13px;color:var(--ink3);padding:10px 0">ไม่มีในขณะนี้</div>`;
    if (done.length) {
      html += sdiv('ครบทดลองงานแล้ว (ดูย้อนหลัง)', done.length, 'b-gray');
      html += done.map(e => probCard(e,'manager')).join('');
    }
  }
  document.getElementById('view-manager').innerHTML = html;
}

// ASSIGN MENTOR — น้อง: กรองตาม section | พี่เลี้ยง: กรองตาม dept (ฝ่าย)
// ============================================================
function openAssign(empId) {
  assignEmpId   = empId;
  pickedMentorId = null;
  const emp = EMP_DATA.find(e => e.id === empId);

  // พี่เลี้ยงในฝ่ายเดียวกัน (dept) — ตามกฎ
  const sameDept  = MENTOR_DATA.filter(m => m.active && m.dept === emp.dept);
  const otherDept = MENTOR_DATA.filter(m => m.active && m.dept !== emp.dept);

  const existingPair   = PAIRS.find(p => p.eeId === empId);
  const existingMentor = existingPair ? MENTOR_DATA.find(m => m.id === existingPair.mId) : null;
  // budget สะสมทั้งหมดที่น้องคนนี้ใช้ไปแล้ว (รวมทุก pair เก่า)
  const totalUsedByMentee = PAIRS.filter(p => p.eeId === empId).reduce((s,p) => s+p.used, 0);

  document.getElementById('assign-title').textContent = `เลือกพี่เลี้ยงให้ ${emp.name} (${emp.nick})`;
  document.getElementById('assign-sub').innerHTML =
    `ฝ่าย ${emp.dept} · ส่วน ${emp.section} · ${emp.unit} · แสดงพี่เลี้ยงในฝ่ายเดียวกันก่อน`
    + (existingMentor ? `
      <div style="margin-top:10px;padding:12px 14px;background:var(--amber-light);border-radius:10px;border-left:3px solid var(--amber)">
        <div style="font-size:12px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">⚠ กำลังเปลี่ยนพี่เลี้ยง</div>
        <div style="font-size:13px;color:var(--ink2)">
          พี่เลี้ยงคนปัจจุบัน: <strong>${existingMentor.name}</strong> · Budget ใช้ไปแล้ว ฿${totalUsedByMentee.toLocaleString()}<br>
          <strong style="color:var(--amber)">กรุณาแจ้ง HR หากมีการเปลี่ยนพี่เลี้ยง</strong> — Budget ที่เหลือจาก ฿${BUDGET.toLocaleString()} จะนับต่อเนื่องจากยอดเดิม
        </div>
      </div>` : '');

  const mcard = (m, isSame) => {
    const actN    = PAIRS.filter(p => p.mId === m.id && EMP_DATA.find(e => e.id === p.eeId)?.isProb).length;
    const totN    = PAIRS.filter(p => p.mId === m.id).length;
    const current = PAIRS.find(p => p.eeId === empId)?.mId === m.id;
    return `
    <div class="mcard ${isSame?'same-dept':''} ${current?'picked':''}"
         id="mc-${m.id}" onclick="pickMentor('${m.id}')">
      <div class="mcard-check">${current?'✓':''}</div>
      <div class="mcard-ava" style="background:${deptColor(m.dept)}"></div>
      <div class="mcard-name">${m.name}</div>
      <div class="mcard-dept">${m.dept} · ${m.section}</div>
      <div class="mcard-stats">
        <span class="mcard-stat ${actN>=2?'ms-active':'ms-ok'}">ดูแลอยู่ ${actN} คน</span>
        <span class="mcard-stat ms-total">ทั้งหมด ${totN} คน</span>
      </div>
    </div>`;
  };

  let html = '';
  if (sameDept.length) {
    html += `<div class="picker-section-label">✦ ฝ่ายเดียวกัน — ${emp.dept}</div>`;
    html += `<div class="mentor-grid">${sameDept.map(m => mcard(m,true)).join('')}</div>`;
  } else {
    html += `<div style="background:var(--amber-light);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--amber);margin-bottom:16px">
      ไม่มีพี่เลี้ยงในฝ่าย ${emp.dept} — แสดงพี่เลี้ยงจากฝ่ายอื่นแทน
    </div>`;
  }
  if (otherDept.length) {
    html += `<div class="picker-section-label">ฝ่ายอื่น</div>`;
    html += `<div class="mentor-grid">${otherDept.map(m => mcard(m,false)).join('')}</div>`;
  }

  if (existingPair) {
    pickedMentorId = existingPair.mId;
  }

  document.getElementById('assign-body').innerHTML = html;
  openM('m-assign');
}

function pickMentor(id) {
  document.querySelectorAll('.mcard').forEach(el => {
    el.classList.remove('picked');
    el.querySelector('.mcard-check').textContent = '';
  });
  const el = document.getElementById('mc-' + id);
  el.classList.add('picked');
  el.querySelector('.mcard-check').textContent = '✓';
  pickedMentorId = id;
}

async function confirmAssign() {
  if (!pickedMentorId) { alert('กรุณาเลือกพี่เลี้ยงก่อนนะคะ'); return; }
  const btn = document.querySelector('#m-assign .btn-sage');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังบันทึก...'; }

  try {
    const res = await apiPost({ action: 'savePair', eeId: assignEmpId, mId: pickedMentorId });
    if (!res.ok) throw new Error(res.error);

    // ── budget สะสมทั้งหมดที่น้องคนนี้ใช้ไปแล้ว (รวมทุก pair เก่า)
    const totalUsedSoFar = PAIRS.filter(p => p.eeId === assignEmpId).reduce((s,p) => s+p.used, 0);

    // ── เปลี่ยนพี่เลี้ยง: ลบ pair เก่าออก แต่ยังคง budget ที่ใช้ไปแล้วไว้
    // สร้าง pair ใหม่โดยใส่ used = totalUsedSoFar เพื่อนับต่อยอดเดิม
    const alreadyPaired = PAIRS.find(p => p.eeId === assignEmpId && p.mId === pickedMentorId);
    if (!alreadyPaired) {
      // เก็บประวัติ txns เดิมทั้งหมดรวมกัน
      const allOldTxns = PAIRS.filter(p => p.eeId === assignEmpId).flatMap(p => p.txns);
      // ลบ pair เก่าออก
      const toRemove = PAIRS.findIndex(p => p.eeId === assignEmpId);
      if (toRemove >= 0) PAIRS.splice(toRemove, 1);
      // สร้าง pair ใหม่ที่สืบ budget ต่อจากเดิม
      PAIRS.push({
        mId: pickedMentorId,
        eeId: assignEmpId,
        used: totalUsedSoFar,     // นับต่อยอดเดิม ไม่ reset เป็น 0
        txns: allOldTxns,         // เก็บประวัติการเบิกทุกรายการ
        prevMentors: PAIRS.filter(p => p.eeId === assignEmpId).map(p => p.mId), // log พี่เลี้ยงเก่า
        changedAt: new Date().toISOString().split('T')[0]
      });
    }
    // Update mentorId + assignedAt ใน EMP_DATA
    const emp = EMP_DATA.find(e => e.id === assignEmpId);
    const now = new Date().toLocaleString('sv').replace('T', ' ').slice(0,19);
    if (emp) { emp.mentorId = pickedMentorId; emp.assignedAt = now; }
    // อัปเดต assignedAt ใน PAIRS ด้วย
    const updatedPair = PAIRS.find(p => p.eeId === assignEmpId && p.mId === pickedMentorId);
    if (updatedPair) updatedPair.assignedAt = now;

    // แจ้ง HR ทาง mailto
    const empN   = EMP_DATA.find(e => e.id === assignEmpId);
    const mtorN  = MENTOR_DATA.find(m => m.id === pickedMentorId);
    if (HR_EMAIL && empN && mtorN) {
      const subj = encodeURIComponent('[HR Platform] หัวหน้าเลือกพี่เลี้ยงแล้ว — ' + empN.name);
      const body = encodeURIComponent(
        'เรียน HR\n\n' +
        'หัวหน้า ' + (user.name||'') + ' ได้เลือกพี่เลี้ยงให้น้องใหม่แล้วค่ะ\n\n' +
        'น้อง: ' + empN.name + ' (' + empN.nick + ') · ' + empN.dept + '\n' +
        'พี่เลี้ยง: ' + mtorN.name + ' (' + mtorN.nick + ') · ' + mtorN.dept + '\n' +
        'วันที่: ' + new Date().toLocaleDateString('th-TH') + '\n\n' +
        'กรุณาตรวจสอบใน HR Platform\n\nขอบคุณค่ะ'
      );
      window.open('mailto:' + HR_EMAIL + '?subject=' + subj + '&body=' + body);
    }

    closeM('m-assign');
    if (role === 'manager') renderMgr();
    else renderProb();
  } catch (err) {
    alert('บันทึกไม่สำเร็จ: ' + err.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'ยืนยัน'; }
  }
}

// SUPERVISOR VIEW — หัวหน้าโดยตรง เห็นแค่น้องของตัวเอง
// ============================================================
function renderSupervisor() {
  // กรองเฉพาะน้องที่ supervisorId ตรงกับ user.id
  const myEmps = EMP_DATA.filter(e => String(e.supervisorId) === String(user.id));
  const act    = myEmps.filter(e => !calcProb(e.startDate).done);
  const done   = myEmps.filter(e =>  calcProb(e.startDate).done);

  let urg = 0, warn = 0;
  act.forEach(e => {
    const {dDL} = calcProb(e.startDate);
    if (dDL <= 7) urg++; else if (dDL <= 21) warn++;
  });

  let html = `
    <div class="page-hero">
      <h1>${user.name}</h1>
      <p>หัวหน้าโดยตรง · ฝ่าย ${user.dept} · ส่วน ${user.section} · น้องในความดูแล ${myEmps.length} คน</p>
    </div>`;

  if (myEmps.length) {
    html += `<div class="stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="stat ${urg>0?'stat-red':'stat-default'}">
        <div class="stat-label">ต้องแจ้ง HR ด่วน (≤7 วัน)</div>
        <div class="stat-val">${urg}</div>
      </div>
      <div class="stat ${warn>0?'stat-amber':'stat-default'}">
        <div class="stat-label">ใกล้กำหนด (≤21 วัน)</div>
        <div class="stat-val">${warn}</div>
      </div>
      <div class="stat stat-sage">
        <div class="stat-label">ผ่านทดลองงานแล้ว</div>
        <div class="stat-val">${done.length}</div>
      </div>
    </div>`;
  }

  if (!myEmps.length) {
    html += `<div class="empty"><div class="empty-icon">🎉</div><div class="empty-txt">ไม่มีน้องในความดูแล</div></div>`;
  } else {
    html += sdiv('กำลังทดลองงาน', act.length, 'b-amber');
    html += act.length
      ? act.map(e => probCard(e, 'supervisor')).join('')
      : `<div style="font-size:13px;color:var(--ink3);padding:10px 0">ไม่มีในขณะนี้</div>`;
    if (done.length) {
      html += sdiv('ครบทดลองงานแล้ว (ดูย้อนหลัง)', done.length, 'b-gray');
      html += done.map(e => probCard(e, 'supervisor')).join('');
    }
  }
  document.getElementById('view-supervisor').innerHTML = html;
}

function renderMentor() {
  const myP   = PAIRS.filter(p => p.mId === user.id);
  const actP  = myP.filter(p => !calcProb(EMP_DATA.find(e => e.id === p.eeId)?.startDate || '2000-01-01').done);
  const doneP = myP.filter(p =>  calcProb(EMP_DATA.find(e => e.id === p.eeId)?.startDate || '2000-01-01').done);

  const actUsed = actP.reduce((s,p) => s+p.used, 0);
  const actBgt  = actP.length * BUDGET;
  const actLeft = actBgt - actUsed;
  const totUsed = myP.reduce((s,p) => s+p.used, 0);

  let html = `
    <div class="page-hero">
      <h1>สวัสดีค่ะ ${user.nick} 👋</h1>
      <p>น้องในความดูแลทั้งหมด ${myP.length} คน · ${user.dept} · ${user.section}</p>
    </div>`;

    html += `<div class="empty"><div class="empty-icon">💌</div><div class="empty-txt">ยังไม่มีน้องในความดูแล</div></div>`;
    document.getElementById('view-mentor').innerHTML = html; return;

  html += `<div class="stats" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat stat-default"><div class="stat-label">น้องทั้งหมด</div><div class="stat-val">${myP.length}</div></div>
    <div class="stat ${actLeft>0?'stat-sage':'stat-default'}">
      <div class="stat-label">Budget ที่ใช้ได้ (ยังทดลองอยู่)</div>
      <div class="stat-val" style="${actLeft>0?'':'color:var(--ink3)'}">฿${actLeft.toLocaleString()}</div>
    </div>
    <div class="stat stat-amber"><div class="stat-label">ใช้ไปแล้วรวม</div><div class="stat-val">฿${totUsed.toLocaleString()}</div></div>
  </div>
  ${actP.length===0&&myP.length>0?`<div style="background:var(--line2);border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--ink3)">น้องทุกคนผ่านทดลองงานแล้ว — budget ทั้งหมดหมดอายุ</div>`:''}`;

  const pcard = p => {
    const e = EMP_DATA.find(x => x.id === p.eeId);
    if (!e) return '';
    const left = BUDGET - p.used;
    const pct  = Math.round((p.used / BUDGET) * 100);
    const {endP, dLeft, dDL, done} = calcProb(e.startDate);
    const st = statusOf(dDL, done, e ? e.hrAcknowledged : false);

    const budgetBlock = done ? `
      <div style="background:var(--line2);border-radius:12px;padding:16px;margin-bottom:14px;opacity:0.7">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:13px;color:var(--ink2)">Budget ที่ใช้ไป</span>
          <span style="font-family:var(--mono);font-size:15px;font-weight:700;color:var(--ink3)">฿${p.used.toLocaleString()} / ฿${BUDGET.toLocaleString()}</span>
        </div>
        <div class="pbar-wrap" style="height:8px;margin-bottom:6px"><div class="pbar-fill" style="width:${pct}%;background:var(--ink3)"></div></div>
        <div style="font-size:12px;color:var(--ink3)">Budget หมดอายุแล้ว — ยอดที่เหลือ ฿${left.toLocaleString()} ไม่สามารถใช้ได้</div>
      </div>` : `
      <div style="background:var(--line2);border-radius:12px;padding:16px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

    return `<div class="card ${done?'done':''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">
        <div>
          <div style="font-size:16px;font-weight:700">${e.name}

          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line2);font-size:14px">
            <span>${t.n}</span>
            <div style="display:flex;align-items:center;gap:14px">
              <span style="color:var(--ink3);font-size:12px">${t.d}</span>
              <span style="font-family:var(--mono);font-weight:700">฿${t.a.toLocaleString()}</span>
            </div>
          </div>`).join('')}` : ''}
      <div style="margin-top:12px;font-size:13px;color:var(--ink2)">
        ${done ? '✓ น้องผ่านทดลองงานแล้ว · budget หมดอายุ' : `ครบ probation วันที่ <strong>${fmtD(endP)}</strong>`}
      </div>
    </div>`;
  };

  html += sdiv('กำลังทดลองงาน', actP.length, 'b-amber');

  if (doneP.length) {
    html += sdiv('ครบทดลองงานแล้ว (ประวัติ)', doneP.length, 'b-gray');
    html += doneP.map(pcard).join('');
  }
  document.getElementById('view-mentor').innerHTML = html;
}

async function saveBgt() {
  const sel = document.getElementById('bgt-pair').value;
  const amt = Number(document.getElementById('bgt-amt').value);
  const nte = document.getElementById('bgt-note').value.trim();
  const dt  = document.getElementById('bgt-date').value;
  if (!sel || !amt || amt <= 0) { alert('กรุณากรอกข้อมูลให้ครบ'); return; }

  const [mId, eeId] = sel.split('__');
  const pair = PAIRS.find(p => p.mId === mId && p.eeId === eeId);
  if (!pair) { alert('ไม่พบ pair'); return; }
  if (pair.used + amt > BUDGET) { alert(`เกิน Budget (คงเหลือ ฿${BUDGET - pair.used})`); return; }

  const btn = document.getElementById('bgt-save-btn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

  try {
    const res = await apiPost({ action: 'recordBudget', menteeId: eeId, mentorId: mId, date: dt, amount: amt, note: nte });
    if (!res.ok) throw new Error(res.error);
    pair.used += amt;
    pair.txns.push({ d: dt, a: amt, n: nte });
    closeM('m-bgt');
    document.getElementById('bgt-amt').value  = '';
    document.getElementById('bgt-note').value = '';
    if (role === 'hr') renderBgtTab();
    else renderMentor();
  } catch (err) {
    alert('บันทึกไม่สำเร็จ: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'บันทึก';
  }
}

function showBgt(mId, eeId) {
  const p = PAIRS.find(x => x.mId === mId && x.eeId === eeId);
  const m = MENTOR_DATA.find(x => x.id === mId);
  const e = EMP_DATA.find(x => x.id === eeId);
  if (!p) return;
  const left = BUDGET - p.used;
  showInfo(
    `Budget: ${m?.name||mId} → ${e?.name||eeId}`,
    `<div style="margin-bottom:14px">
      <span style="font-family:var(--mono);font-size:22px;font-weight:700;color:${left<500?'var(--red)':left<1500?'var(--amber)':'var(--sage)'}">฿${left.toLocaleString()}</span>
      <span style="color:var(--ink3);font-size:13px"> คงเหลือ จาก ฿${BUDGET.toLocaleString()}</span>
    </div>
    ${p.txns.map(t => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line2);font-size:13px">
      <span>${t.n}</span>
      <span style="font-family:var(--mono)">${t.d} · ฿${t.a.toLocaleString()}</span>
    </div>`).join('') || '<div style="color:var(--ink3);font-size:13px">ยังไม่มีรายการ</div>'}`
  );
}

function filterEmps() {
  const q = (document.getElementById('emp-search')?.value || '').toLowerCase().trim();
  if (!q) { renderAllTab(); return; }
  const act  = EMP_DATA.filter(e => !calcProb(e.startDate).done &&
    (e.name.toLowerCase().includes(q) || e.nick.toLowerCase().includes(q) ||
     e.id.includes(q) || e.dept.toLowerCase().includes(q) || e.section.toLowerCase().includes(q)));
  const done = EMP_DATA.filter(e =>  calcProb(e.startDate).done &&
    (e.name.toLowerCase().includes(q) || e.nick.toLowerCase().includes(q) ||
     e.id.includes(q) || e.dept.toLowerCase().includes(q) || e.section.toLowerCase().includes(q)));
  const el = document.getElementById('emp-list');
  if (!el) return;
  function empCards(emps) {
    if (!emps.length) return '';
    return '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:24px">' +
      emps.map(e => {
        const pair = PAIRS.find(p => p.eeId === e.id);
        const mentor = pair ? MENTOR_DATA.find(m => m.id === pair.mId) : null;
        const {done: isDone, pct} = calcProb(e.startDate);
        const initial = (e.name||'?').charAt(0);
        const bg = deptColor(e.dept);
        return '<div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow)">' +
          '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' +
            '<div style="width:44px;height:44px;border-radius:50%;background:' + bg + ';flex-shrink:0"></div>' +
            '<div style="min-width:0;flex:1">' +
              '<div style="font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + e.name + '</div>' +
              '<div style="font-size:12px;color:var(--ink3)">' + e.nick + ' · <span style="font-family:var(--mono)">' + e.id + '</span></div>' +
            '</div>' +
            (isDone ? '<span class="badge b-gray" style="font-size:11px;flex-shrink:0">✓ ผ่านแล้ว</span>' : '<span class="badge b-amber" style="font-size:11px;flex-shrink:0">⏳ ทดลองงาน</span>') +
          '</div>' +
          '<div style="font-size:12px;color:var(--ink2);margin-bottom:4px"><div style="font-weight:600">' + e.dept + '</div><div style="color:var(--ink3)">' + e.section + (e.unit ? ' · ' + e.unit : '') + '</div></div>' +
          '<div style="font-size:12px;color:var(--ink3);margin-bottom:10px">' + e.pos + '</div>' +
          (!isDone ? '<div style="height:4px;background:var(--line2);border-radius:2px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:' + pct + '%;background:var(--sage);border-radius:2px"></div></div>' : '') +
          '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink3)">' +
            '<span>เริ่มงาน <strong style="color:var(--ink2);font-family:var(--mono)">' + e.startDate + '</strong></span>' +
            (mentor ? '<span style="background:var(--sage-light);color:var(--sage);padding:2px 8px;border-radius:20px;font-weight:600">' + mentor.nick + '</span>' : '<span style="color:var(--ink3)">ยังไม่มีพี่เลี้ยง</span>') +
          '</div>' +
        '</div>';
      }).join('') + '</div>';
  }
  el.innerHTML = (act.length ? sdiv('กำลังทดลองงาน', act.length, 'b-amber') + empCards(act) : '') +
    (done.length ? sdiv('ครบทดลองงานแล้ว (ประวัติ)', done.length, 'b-gray') + empCards(done) : '') ||
    '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">ไม่พบ "' + q + '"</div></div>';
}

async function markHRNotified(empId) {
  HR_NOTIFIED.add(empId);
  // อัปเดต local state ทันที
  const emp = EMP_DATA.find(e => e.id === empId);
  if (emp) emp.hrAcknowledged = true;
  if (role === 'hr') renderProb();
  // บันทึกลง Sheet
  try {
    await apiPost({ action: 'acknowledgeProb', eeId: empId });
  } catch(e) {
    console.log('acknowledge save error:', e);
  }
}

function remindOne(empId) {
  const emp = EMP_DATA.find(e => e.id === empId);
  if (!emp) return;
  const mgr = MGR_DATA.find(m => m.id === emp.mgrId);
  const {dl} = calcProb(emp.startDate);
  const to   = mgr?.email || '';
  const subj = encodeURIComponent(`[HR Reminder] แจ้งผล Probation — ${emp.name}`);
  const body = encodeURIComponent(
    `เรียน คุณ${mgr?.name||'หัวหน้า'}\n\n` +
    `กรุณาแจ้งผลการทดลองงานของ ${emp.name} (${emp.nick})\n` +
    `ฝ่าย ${emp.dept} · ส่วน ${emp.section} · ${emp.unit}\n` +
    `ภายในวันที่ ${fmtD(dl)}\n\nขอบคุณค่ะ / HR`
  );
  window.open(`mailto:${to}?subject=${subj}&body=${body}`);
}

function remindAll() {
  const act = EMP_DATA.filter(e => !calcProb(e.startDate).done);
  const urgent = act.filter(e => { const {dDL} = calcProb(e.startDate); return dDL <= 21; });
  if (!urgent.length) { alert('ไม่มีพนักงานที่ต้องแจ้งเตือนในขณะนี้'); return; }
  urgent.forEach(e => remindOne(e.id));
}

// ============================================================
// NOTIFICATION (HR only)
// ============================================================
function renderNotif() {
  if (role !== 'hr') return;
  var wrap = document.getElementById('notif-wrap');
  if (wrap) wrap.style.display = 'flex';

  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 14);

  var newPairs = PAIRS.filter(function(p) {
    if (!p.assignedAt) return false;
    var d = new Date(p.assignedAt.replace(' ', 'T'));
    return d >= cutoff;
  }).sort(function(a, b) {
    return new Date(b.assignedAt.replace(' ','T')) - new Date(a.assignedAt.replace(' ','T'));
  });

  var unread = newPairs.filter(function(p) { return !NOTIF_READ.has(p.eeId); });
  var badge  = document.getElementById('notif-badge');
  if (badge) {
    if (unread.length > 0) {
      badge.style.display = 'flex';
      badge.textContent   = unread.length > 9 ? '9+' : String(unread.length);
    } else {
      badge.style.display = 'none';
    }
  }

  var list = document.getElementById('notif-list');
  if (!list) return;

  if (!newPairs.length) {
    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--ink3);font-size:13px">ไม่มีการเลือกพี่เลี้ยงใน 14 วันที่ผ่านมา</div>';
    return;
  }

  list.innerHTML = newPairs.map(function(p) {
    var emp    = EMP_DATA.find(function(e) { return e.id === p.eeId; });
    var mentor = MENTOR_DATA.find(function(m) { return m.id === p.mId; });
    var mgr    = emp ? MGR_DATA.find(function(m) { return m.id === emp.mgrId; }) : null;
    var isRead = NOTIF_READ.has(p.eeId);

    var assignDate = new Date(p.assignedAt.replace(' ','T'));
    var diffDays   = Math.floor((new Date() - assignDate) / 86400000);
    var timeAgo    = diffDays === 0 ? 'วันนี้' : diffDays === 1 ? 'เมื่อวาน' : diffDays + ' วันที่แล้ว';

    var dotHtml  = isRead ? '<span style="width:7px;margin-right:6px;flex-shrink:0;display:inline-block"></span>'
                          : '<span class="notif-new" style="margin-top:4px;display:inline-block"></span>';
    var empName  = emp    ? emp.name    : p.eeId;
    var mtorName = mentor ? mentor.name : p.mId;
    var mgrName  = mgr   ? mgr.name    : (emp ? emp.mgrId : '');
    var itemCls  = isRead ? 'notif-item' : 'notif-item unread';

    return [
      '<div class="' + itemCls + '" onclick="readNotif(\'' + p.eeId + '\')">',
        '<div style="display:flex;align-items:flex-start;gap:8px">',
          dotHtml,
          '<div style="flex:1;min-width:0">',
            '<div style="font-weight:600;margin-bottom:2px">' + empName + '</div>',
            '<div style="color:var(--ink2)">พี่เลี้ยง: <strong>' + mtorName + '</strong></div>',
            '<div style="color:var(--ink3);margin-top:2px">หัวหน้า: ' + mgrName + '</div>',
          '</div>',
          '<span style="font-size:11px;color:var(--ink3);white-space:nowrap;margin-top:2px">' + timeAgo + '</span>',
        '</div>',
      '</div>'
    ].join('');
  }).join('');
}

function toggleNotif() {
  const panel = document.getElementById('notif-panel');
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
}

function readNotif(eeId) {
  NOTIF_READ.add(eeId);
  renderNotif();
}

function markAllRead() {
  PAIRS.forEach(p => { if (p.assignedAt) NOTIF_READ.add(p.eeId); });
  renderNotif();
  document.getElementById('notif-panel').style.display = 'none';
}

// ปิด notif panel เมื่อคลิกนอก
document.addEventListener('click', function(e) {
  const wrap = document.getElementById('notif-wrap');
  if (wrap && !wrap.contains(e.target)) {
    const panel = document.getElementById('notif-panel');
    if (panel) panel.style.display = 'none';
  }
});

// ============================================================
// START
// ============================================================
document.getElementById('loading-screen').style.display = 'flex';
document.getElementById('auth-screen').style.display    = 'none';
document.getElementById('app').style.display            = 'none';
bootstrap();
</script>
